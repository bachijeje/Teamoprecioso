<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>

body{
margin:0;
font-family: "Segoe UI", sans-serif;
background: linear-gradient(180deg,#2b3a55,#4a5d73,#6b7c93);
color:white;
text-align:center;
overflow-x:hidden;
}

/* luces suaves de fondo */

.glow{
position:fixed;
width:200px;
height:200px;
background:rgba(255,255,255,0.08);
border-radius:50%;
filter:blur(40px);
animation:move 12s infinite alternate;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

/* contenedor */

.container{
max-width:700px;
margin:auto;
padding:80px 20px;
}

/* tarjeta */

.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* titulo */

h1{
font-size:42px;
margin-bottom:15px;
}

/* mensajes */

.mensaje{
font-size:18px;
margin:15px 0;
line-height:1.6;
opacity:0.9;
}

/* boton */

button{
margin-top:20px;
padding:14px 28px;
font-size:17px;
border:none;
border-radius:25px;
background:#8ea6c9;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
background:#a6bce0;
}

/* mensaje oculto */

#extra{
display:none;
margin-top:20px;
font-size:19px;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow" style="left:70%;top:40%;animation-duration:15s;"></div>

<div class="container">

<div class="card">

<h1>Para ti</h1>

<p class="mensaje">
Solo quería recordarte algo simple:
eres una persona muy especial.
</p>

<p class="mensaje">
Me alegra mucho que estés en mi vida.
De verdad haces que muchas cosas se sientan más bonitas.
</p>

<p class="mensaje">
Gracias por ser como eres.
</p>

<button onclick="mostrar()">Hay otro mensaje aquí</button>

<div id="extra">
De verdad te quiero mucho 💛
</div>

</div>

</div>

<script>

function mostrar(){
document.getElementById("extra").style.display="block";
}

</script>

</body>
</html>
